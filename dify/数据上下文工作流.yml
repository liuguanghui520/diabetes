    - data:
        code: "import json\n\ndef main(action: str, user_id: str, params: dict) ->\
          \ dict:\n    # action 白名单\n    valid_actions = [\"profile_get\", \"home_summary\"\
          , \"checkin_summary\", \"article_recommend\"]\n    if action not in valid_actions:\n\
          \        return {\n            \"valid\": False,\n            \"error\"\
          : f\"不支持的 action: {action}\",\n            \"action\": \"\",\n         \
          \   \"user_id\": \"\",\n            \"period_start\": \"\",\n          \
          \  \"period_end\": \"\",\n            \"include_latest_risk\": False,\n\
          \            \"include_latest_plan\": False\n        }\n\n    # user_id\
          \ 校验\n    if not user_id or not user_id.strip():\n        return {\n   \
          \         \"valid\": False,\n            \"error\": \"user_id 不能为空\",\n\
          \            \"action\": \"\",\n            \"user_id\": \"\",\n       \
          \     \"period_start\": \"\",\n            \"period_end\": \"\",\n     \
          \       \"include_latest_risk\": False,\n            \"include_latest_plan\"\
          : False\n        }\n\n    # 安全提取各个参数，缺失时给默认空值\n    period_start = \"\"\n\
          \    period_end = \"\"\n    include_latest_risk = False\n    include_latest_plan\
          \ = False\n\n    if params:\n        period_start = str(params.get(\"period_start\"\
          , \"\") or \"\")\n        period_end = str(params.get(\"period_end\", \"\
          \") or \"\")\n        include_latest_risk = bool(params.get(\"include_latest_risk\"\
          , False))\n        include_latest_plan = bool(params.get(\"include_latest_plan\"\
          , False))\n\n    return {\n        \"valid\": True,\n        \"error\":\
          \ \"\",\n        \"action\": action,\n        \"user_id\": user_id.strip(),\n\
          \        \"period_start\": period_start,\n        \"period_end\": period_end,\n\
          \        \"include_latest_risk\": include_latest_risk,\n        \"include_latest_plan\"\
          : include_latest_plan\n    }\n\n"
