    - data:
        code: "def main(\n    http_a: str,   # 节点A的输出（可能为空）\n    http_b: str,   #\
          \ 节点B的输出（可能为空）\n    http_c: str,   # 节点C的输出（可能为空）\n    http_d: str,   #\
          \ 节点D的输出（可能为空）\n    action: str\n) -> dict:\n    import json\n\n    # 根据\
          \ action 选择对应的 HTTP 响应（只有一个非空）\n    response_map = {\n        \"profile_get\"\
          : http_a,\n        \"home_summary\": http_b,\n        \"checkin_summary\"\
          : http_c,\n        \"article_recommend\": http_d\n    }\n\n    http_response\
          \ = response_map.get(action, \"\")\n\n    if not http_response:\n      \
          \  return {\"ok\": False, \"action\": action, \"data\": None, \"warnings\"\
          : [\"未获取到 HTTP 响应\"]}\n\n    try:\n        body = json.loads(http_response)\
          \ if isinstance(http_response, str) else http_response\n    except:\n  \
          \      return {\"ok\": False, \"action\": action, \"data\": None, \"warnings\"\
          : [\"HTTP 响应解析失败\"]}\n\n    if body.get(\"code\") != 0:\n        return\
          \ {\n            \"ok\": False,\n            \"action\": action,\n     \
          \       \"data\": None,\n            \"warnings\": [f\"接口错误: {body.get('message',\
          \ '未知')}\"]\n        }\n\n    data = body.get(\"data\")\n\n    # 敏感字段裁剪\n\
          \    sensitive_fields = [\"emergency_contact\", \"emergency_phone\", \"\
          allergy\"]\n    if action == \"profile_get\" and data:\n        profile\
          \ = data.get(\"profile\")\n        if profile:\n            for field in\
          \ sensitive_fields:\n                profile.pop(field, None)\n\n    return\
          \ {\"ok\": True, \"action\": action, \"data\": data, \"warnings\": []}\n"
        code_language: python3
        outputs:
