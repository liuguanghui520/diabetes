    - data:
        code: "function main({ http_body, period_start, period_end }) {\n  let resp\
          \ = {};\n\n  if (typeof http_body === \"string\") {\n    try {\n      resp\
          \ = JSON.parse(http_body);\n    } catch (e) {\n      resp = {};\n    }\n\
          \  } else if (http_body && typeof http_body === \"object\") {\n    resp\
          \ = http_body;\n  }\n\n  const code = resp.code;\n  const message = resp.message\
          \ || \"\";\n  const traceId = resp.traceId || \"\";\n\n  const data = resp.data\
          \ || {};\n\n  const period = data.period ?? null;\n  const completionRate\
          \ = data.completion_rate ?? null;\n  const items = Array.isArray(data.items)\
          \ ? data.items : [];\n\n  // 当前 Express 返回：\n  // period = null\n  // completion_rate\
          \ = null\n  // items = []\n  // 所以必须判定为数据不足\n  const apiOk = code === 0;\n\
          \  const hasPeriod = period !== null && typeof period === \"object\" &&\
          \ !Array.isArray(period);\n  const hasCompletionRate = typeof completionRate\
          \ === \"number\";\n  const hasItems = items.length > 0;\n\n  const dataSufficient\
          \ = Boolean(\n    apiOk &&\n    hasPeriod &&\n    hasCompletionRate &&\n\
          \    hasItems\n  );\n\n  const summaryForLLM = {\n    period,\n    completion_rate:\
          \ completionRate,\n    items,\n    period_start,\n    period_end\n  };\n\
          \n  return {\n    api_ok: apiOk,\n    message,\n    trace_id: traceId,\n\
          \n    // 为了避免 Dify 对 object 类型不接受 null，这里给空对象\n    period: period || {},\n\
          \n    // 当前 completion_rate 允许为 null\n    completion_rate: completionRate,\n\
          \n    items_count: items.length,\n    data_sufficient: dataSufficient,\n\
          \    summary_for_llm: JSON.stringify(summaryForLLM)\n  };\n}"
        code_language: javascript
