    - data:
        code: "def main(http_body) -> dict:\n    import json\n\n    if isinstance(http_body,\
          \ str):\n        try:\n            resp = json.loads(http_body)\n      \
          \  except Exception:\n            resp = {}\n    elif isinstance(http_body,\
          \ dict):\n        resp = http_body\n    else:\n        resp = {}\n\n   \
          \ code = resp.get(\"code\")\n    message = resp.get(\"message\") or \"\"\
          \n    trace_id = resp.get(\"traceId\") or \"\"\n\n    data = resp.get(\"\
          data\") or {}\n\n    period = data.get(\"period\")\n    completion_rate\
          \ = data.get(\"completion_rate\")\n    items = data.get(\"items\") or []\n\
          \n    # 当前 Express 返回：\n    # period = null\n    # completion_rate = null\n\
          \    # items = []\n    # 所以必须判定为数据不足\n    has_period = isinstance(period,\
          \ dict)\n    has_completion_rate = isinstance(completion_rate, (int, float))\n\
          \    has_items = isinstance(items, list) and len(items) > 0\n\n    api_ok\
          \ = code == 0\n\n    data_sufficient = bool(\n        api_ok\n        and\
          \ has_period\n        and has_completion_rate\n        and has_items\n \
          \   )\n\n    summary_for_llm = {\n        \"period\": period,\n        \"\
          completion_rate\": completion_rate,\n        \"items\": items\n    }\n\n\
          \    return {\n        \"api_ok\": api_ok,\n        \"message\": message,\n\
          \        \"trace_id\": trace_id,\n        \"period\": period,\n        \"\
          completion_rate\": completion_rate,\n        \"items_count\": len(items)\
          \ if isinstance(items, list) else 0,\n        \"data_sufficient\": data_sufficient,\n\
          \        \"summary_for_llm\": json.dumps(summary_for_llm, ensure_ascii=False)\n\
          \    }"
