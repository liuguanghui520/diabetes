          \ not improvements:\n        improvements = [\n            \"请先完成每日打卡记录\"\
          ,\n            \"建议连续记录至少 3 天后再查看周期分析\",\n            \"后续可补充饮食、运动、睡眠等基础打卡项\"\
          \n        ]\n\n    result = {\n        \"completion_rate\": completion_rate,\n\
          \        \"metrics\": metrics,\n        \"evaluation\": evaluation.strip(),\n\
          \        \"improvements\": improvements,\n        \"data_sufficient\": False,\n\
          \        \"traceId\": trace_id\n    }\n\n    return {\n        \"result\"\
          : result\n    }"
