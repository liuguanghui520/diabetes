    - data:
        code: "function main({ analysis_text, trace_id, completion_rate, metrics,\
          \ data_sufficient }) {\n  let analysis = {};\n\n  if (analysis_text && typeof\
          \ analysis_text === \"object\") {\n    analysis = analysis_text;\n  } else\
          \ if (typeof analysis_text === \"string\") {\n    try {\n      analysis\
          \ = JSON.parse(analysis_text);\n    } catch (e) {\n      analysis = {};\n\
          \    }\n  }\n\n  let finalCompletionRate =\n    analysis.completion_rate\
          \ !== undefined\n      ? analysis.completion_rate\n      : completion_rate;\n\
          \n  let finalMetrics =\n    analysis.metrics !== undefined\n      ? analysis.metrics\n\
          \      : metrics;\n\n  let evaluation = analysis.evaluation;\n\n  if (typeof\
          \ evaluation !== \"string\" || evaluation.trim() === \"\") {\n    evaluation\
          \ = \"当前周期暂无足够打卡数据，暂不生成生活状态评价。\";\n  }\n\n  let improvements = analysis.improvements;\n\
          \n  if (!Array.isArray(improvements)) {\n    improvements = [];\n  }\n\n\
          \  improvements = improvements\n    .filter(item => typeof item === \"string\"\
          \ && item.trim() !== \"\")\n    .map(item => item.trim())\n    .slice(0,\
          \ 3);\n\n  if (improvements.length === 0) {\n    improvements = [\n    \
          \  \"请先完成每日打卡记录\",\n      \"建议连续记录至少 3 天后再查看周期分析\",\n      \"后续可补充饮食、运动、睡眠等基础打卡项\"\
          \n    ];\n  }\n\n  const finalDataSufficient =\n    typeof data_sufficient\
          \ === \"boolean\"\n      ? data_sufficient\n      : false;\n\n  const result\
          \ = {\n    completion_rate: finalCompletionRate ?? null,\n    metrics: finalMetrics\
          \ ?? null,\n    evaluation: evaluation.trim(),\n    improvements,\n    data_sufficient:\
          \ finalDataSufficient,\n    traceId: trace_id || \"\"\n  };\n\n  return\
          \ {\n    result\n  };\n}"
