    - data:
        code: "def main(arg1):\n    import json\n    \n    # 兜底建议\n    fallback =\
          \ {\n        \"advice\": {\n            \"summary\": \"系统暂时无法生成个性化建议，请参考通用健康指导。\"\
          ,\n            \"diet\": [\"均衡饮食，控制总热量摄入\", \"多吃蔬菜水果，减少高糖高脂食物\"],\n    \
          \        \"exercise\": [\"每周至少150分钟中等强度运动\", \"饭后散步30分钟\"],\n          \
          \  \"review\": [\"建议完善个人健康信息后重新评估\"],\n            \"warning\": \"本结果仅用于健康管理参考，不作为医学诊断。如有不适请及时就医。\"\
          \n        }\n    }\n    \n    try:\n        # 尝试解析 LLM 输出的 JSON\n      \
          \  text = arg1.strip()\n        \n        # 移除可能的 markdown 代码块标记\n     \
          \   if text.startswith(\"```\"):\n            lines = text.split(\"\\n\"\
          )\n            text = \"\\n\".join(lines[1:-1] if lines[-1].strip() == \"\
          ```\" else lines[1:])\n        \n        data = json.loads(text)\n     \
          \   \n        # 校验必需字段\n        advice = data.get(\"advice\", {})\n    \
          \    required = [\"summary\", \"diet\", \"exercise\", \"review\", \"warning\"\
          ]\n        \n        for field in required:\n            if field not in\
          \ advice or not advice[field]:\n                return {\"advice\": fallback[\"\
          advice\"], \"valid\": False}\n        \n        # 确保数组字段确实是数组\n        for\
          \ arr_field in [\"diet\", \"exercise\", \"review\"]:\n            if not\
          \ isinstance(advice[arr_field], list):\n                advice[arr_field]\
          \ = [str(advice[arr_field])]\n        \n        return {\"advice\": advice,\
          \ \"valid\": True}\n        \n    except (json.JSONDecodeError, KeyError,\
          \ TypeError) as e:\n        return {\"advice\": fallback[\"advice\"], \"\
          valid\": False}"
