    - data:
        code: "def main(score_status, score_detail, diagnosed_diabetes, score, risk_level,\n\
          \         missing_fields, past_history, labs):\n    import json\n\n    error_msg\
          \ = \"\"\n\n    # ── 1. 确定用户状态（供 If-Else 分支使用） ──\n    if diagnosed_diabetes:\n\
          \        user_status = \"diagnosed\"\n    elif score_status == \"complete\"\
          :\n        user_status = \"complete\"\n    else:\n        user_status =\
          \ \"incomplete\"\n\n    # ── 2. 辅助函数：安全转为 JSON 字符串 ──\n    def safe_json_str(value,\
          \ default=\"[]\"):\n        \"\"\"把任意类型安全转成 JSON 字符串，给 LLM 节点在 Jinja2 中渲染\"\
          \"\"\n        if value is None:\n            return default\n        if\
          \ isinstance(value, str):\n            # 已经是字符串，验证是否为合法 JSON\n         \
          \   try:\n                json.loads(value)\n                return value\
          \  # 合法 JSON 字符串，直接返回\n            except (json.JSONDecodeError, TypeError):\n\
          \                return json.dumps(value, ensure_ascii=False)\n        try:\n\
          \            return json.dumps(value, ensure_ascii=False)\n        except\
          \ (TypeError, ValueError):\n            return default\n\n    # ── 3. 转换所有\
          \ JSON 对象为字符串 ──\n    score_detail_str = safe_json_str(score_detail, \"\
          {}\")\n    missing_fields_str = safe_json_str(missing_fields, \"[]\")\n\
          \    past_history_str = safe_json_str(past_history, \"[]\")\n    labs_str\
          \ = safe_json_str(labs, \"{}\")\n\n    # ── 4. 校验 score_detail 内容合法性 ──\n\
          \    try:\n        sd = json.loads(score_detail_str)\n        if not isinstance(sd,\
          \ dict):\n            error_msg = \"score_detail 不是合法对象\"\n    except json.JSONDecodeError:\n\
          \        error_msg = \"score_detail JSON 解析失败\"\n\n    valid = (error_msg\
          \ == \"\")\n\n    return {\n        \"valid\": valid,\n        \"error_msg\"\
          : error_msg,\n        \"user_status\": user_status,\n        \"score_detail_str\"\
          : score_detail_str,\n        \"missing_fields_str\": missing_fields_str,\n\
          \        \"past_history_str\": past_history_str,\n        \"labs_str\":\
          \ labs_str,\n        \"score\": score,\n        \"risk_level\": risk_level,\n\
          \    }"
