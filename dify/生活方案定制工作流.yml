          \    if isinstance(fallback_text, dict):\n        body = fallback_text\n\
          \n    # 模板转换通常输出 String，需要解析\n    elif isinstance(fallback_text, str):\n\
          \        text = fallback_text.strip()\n\n        # 兼容 ```json ... ``` 代码块\n\
          \        if text.startswith(\"```json\"):\n            text = text[7:].strip()\n\
          \        elif text.startswith(\"```\"):\n            text = text[3:].strip()\n\
          \n        if text.endswith(\"```\"):\n            text = text[:-3].strip()\n\
          \n        try:\n            body = json.loads(text)\n        except json.JSONDecodeError\
          \ as error:\n            raise ValueError(f\"基础方案 JSON 解析失败：{error}\")\n\
          \n    else:\n        raise ValueError(\"fallback_text 必须是 JSON 字符串或 Object\"\
          )\n\n    # 确保最外层为对象\n    if not isinstance(body, dict):\n        raise ValueError(\"\
          基础方案 JSON 最外层必须是 Object\")\n\n    return {\n        \"body\": body\n   \
          \ }"
