    - data:
        code: "import json\nimport re\n\n\ndef main(json_data) -> dict:\n    \"\"\"\
          \n    将生活方案 JSON 拆分为五个顶层字段。\n\n    支持两种输入：\n    1. Dify 结构化输出生成的 Object\n\
          \    2. LLM 输出的 JSON 字符串\n    \"\"\"\n\n    # structured_output 通常已经是字典\n\
          \    if isinstance(json_data, dict):\n        data = json_data\n\n    #\
          \ 兼容普通 JSON 字符串\n    elif isinstance(json_data, str):\n        text = json_data.strip()\n\
          \n        # 清除模型可能输出的 Markdown 代码块\n        text = re.sub(\n           \
          \ r\"^```(?:json)?\\s*\",\n            \"\",\n            text,\n      \
          \      flags=re.IGNORECASE\n        )\n        text = re.sub(r\"\\s*```$\"\
          , \"\", text)\n\n        data = json.loads(text)\n\n    else:\n        raise\
          \ ValueError(\"json_data 必须是 JSON 对象或 JSON 字符串\")\n\n    if not isinstance(data,\
          \ dict):\n        raise ValueError(\"JSON 顶层必须是对象\")\n\n    # 获取字段\n   \
          \ title = data.get(\"title\", \"\")\n    summary = data.get(\"summary\"\
          , \"\")\n    sections = data.get(\"sections\", [])\n    tasks = data.get(\"\
          tasks\", [])\n    disclaimer = data.get(\"disclaimer\", \"\")\n\n    # 字段类型校验\n\
          \    if not isinstance(title, str):\n        raise ValueError(\"title 必须是字符串\"\
          )\n\n    if not isinstance(summary, str):\n        raise ValueError(\"summary\
          \ 必须是字符串\")\n\n    if not isinstance(sections, list):\n        raise ValueError(\"\
          sections 必须是数组\")\n\n    if not isinstance(tasks, list):\n        raise\
          \ ValueError(\"tasks 必须是数组\")\n\n    if not isinstance(disclaimer, str):\n\
          \        raise ValueError(\"disclaimer 必须是字符串\")\n\n    # 校验 sections 内部结构\n\
          \    for section_index, section in enumerate(sections):\n        if not\
          \ isinstance(section, dict):\n            raise ValueError(\n          \
          \      f\"sections 第 {section_index + 1} 项必须是对象\"\n            )\n\n   \
          \     if not isinstance(section.get(\"type\", \"\"), str):\n           \
          \ raise ValueError(\n                f\"sections 第 {section_index + 1} 项的\
          \ type 必须是字符串\"\n            )\n\n        if not isinstance(section.get(\"\
          title\", \"\"), str):\n            raise ValueError(\n                f\"\
          sections 第 {section_index + 1} 项的 title 必须是字符串\"\n            )\n\n    \
          \    items = section.get(\"items\", [])\n\n        if not isinstance(items,\
          \ list):\n            raise ValueError(\n                f\"sections 第 {section_index\
          \ + 1} 项的 items 必须是数组\"\n            )\n\n        for item_index, item in\
          \ enumerate(items):\n            if not isinstance(item, dict):\n      \
          \          raise ValueError(\n                    f\"sections 第 {section_index\
          \ + 1} 项中的 \"\n                    f\"第 {item_index + 1} 个 item 必须是对象\"\n\
          \                )\n\n    # 校验 tasks 内部结构\n    for task_index, task in enumerate(tasks):\n\
          \        if not isinstance(task, dict):\n            raise ValueError(\n\
          \                f\"tasks 第 {task_index + 1} 项必须是对象\"\n            )\n\n\
          \    return {\n        \"title\": title,\n        \"summary\": summary,\n\
          \        \"sections\": sections,\n        \"tasks\": tasks,\n        \"\
          disclaimer\": disclaimer\n    }"
