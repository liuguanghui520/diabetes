    - data:
        code: "import json\n\n\ndef is_number(value):\n    \"\"\"判断是否为数字，排除 Boolean。\"\
          \"\"\n    return isinstance(value, (int, float)) and not isinstance(value,\
          \ bool)\n\n\ndef main(structured_output) -> dict:\n    errors = []\n\n \
          \   # 兼容 Object 和 JSON 字符串\n    if isinstance(structured_output, dict):\n\
          \        data = structured_output\n\n    elif isinstance(structured_output,\
          \ str):\n        text = structured_output.strip()\n\n        # 兼容模型返回的 Markdown\
          \ JSON 代码块\n        if text.startswith(\"```json\"):\n            text =\
          \ text[7:]\n        elif text.startswith(\"```\"):\n            text = text[3:]\n\
          \n        if text.endswith(\"```\"):\n            text = text[:-3]\n\n \
          \       try:\n            data = json.loads(text.strip())\n        except\
          \ json.JSONDecodeError as error:\n            return {\n               \
          \ \"is_legal\": False,\n                \"body\": {\n                  \
          \  \"_validation_errors\": [\n                        f\"JSON 解析失败：{str(error)}\"\
          \n                    ]\n                }\n            }\n\n    else:\n\
          \        return {\n            \"is_legal\": False,\n            \"body\"\
          : {\n                \"_validation_errors\": [\n                    \"structured_output\
          \ 必须是 Object 或 JSON 字符串\"\n                ]\n            }\n        }\n\
          \n    if not isinstance(data, dict):\n        return {\n            \"is_legal\"\
          : False,\n            \"body\": {\n                \"_validation_errors\"\
          : [\n                    \"最外层必须是 JSON 对象\"\n                ]\n       \
          \     }\n        }\n\n    # 兼容测试时额外包了一层 structured_output\n    if (\n  \
          \      \"structured_output\" in data\n        and isinstance(data[\"structured_output\"\
          ], dict)\n        and len(data) == 1\n    ):\n        data = data[\"structured_output\"\
          ]\n\n    # 校验顶层字符串字段\n    for field in [\"title\", \"summary\", \"disclaimer\"\
          ]:\n        if field not in data:\n            errors.append(f\"缺少字段：{field}\"\
          )\n        elif not isinstance(data[field], str):\n            errors.append(f\"\
          {field} 必须是 String\")\n        elif not data[field].strip():\n         \
          \   errors.append(f\"{field} 不能为空\")\n\n    # 校验 sections\n    sections\
