    - data:
        code: "import json\nfrom typing import Any\n\n\ndef parse_object(value: Any,\
          \ field_name: str) -> dict:\n    \"\"\"\n    将字段统一转换为 Object。\n    支持字典、JSON\
          \ 字符串和空值。\n    \"\"\"\n    if value is None or value == \"\":\n        return\
          \ {}\n\n    if isinstance(value, dict):\n        return value\n\n    if\
          \ isinstance(value, str):\n        text = value.strip()\n\n        if not\
          \ text:\n            return {}\n\n        try:\n            result = json.loads(text)\n\
          \        except json.JSONDecodeError as error:\n            raise ValueError(\n\
          \                f\"{field_name} JSON 解析失败：\"\n                f\"第 {error.lineno}\
          \ 行，第 {error.colno} 列，\"\n                f\"{error.msg}\"\n           \
          \ )\n\n        if not isinstance(result, dict):\n            raise ValueError(\n\
          \                f\"{field_name} 必须是 JSON 对象，\"\n                f\"不能是\
          \ {type(result).__name__}\"\n            )\n\n        return result\n\n\
          \    raise ValueError(\n        f\"{field_name} 必须是 Object 或 JSON 字符串，\"\
          \n        f\"当前类型：{type(value).__name__}\"\n    )\n\n\ndef main(\n    body:\
          \ Any = None,\n    status_code: Any = None,\n    **kwargs\n) -> dict:\n\
          \    # 1. 校验 HTTP 状态码\n    if status_code not in (None, \"\"):\n       \
          \ try:\n            http_status = int(status_code)\n        except (TypeError,\
          \ ValueError):\n            raise ValueError(\n                f\"status_code\
          \ 无效：{status_code}\"\n            )\n\n        if not 200 <= http_status\
          \ < 300:\n            raise ValueError(\n                f\"HTTP 请求失败，状态码：{http_status}\"\
          \n            )\n\n    # 2. 解析 HTTP body\n    payload = parse_object(body,\
          \ \"body\")\n\n    # 3. 校验业务状态\n    business_code = payload.get(\"code\"\
          )\n\n    if business_code not in (None, 0, \"0\", 200, \"200\"):\n     \
          \   message = payload.get(\"message\") or \"接口请求失败\"\n        raise ValueError(\n\
          \            f\"接口返回错误：code={business_code}，message={message}\"\n      \
          \  )\n\n    # 4. 兼容接口使用 data 包装结果\n    data = payload.get(\"data\")\n\n\
          \    if isinstance(data, dict):\n        source = data\n    else:\n    \
          \    source = payload\n\n    # 5. 获取 profile\n    profile_value = source.get(\"\
          profile\")\n\n    if profile_value is not None:\n        profile = parse_object(profile_value,\
          \ \"profile\")\n    else:\n        # 兼容接口直接返回用户字段，没有 profile 外层\n      \
          \  profile = {}\n\n        profile_fields = [\n            \"user_id\",\n\
          \            \"risk_assessment_id\",\n            \"preferences\"\n    \
          \    ]\n\n        for field in profile_fields:\n            if field in\
          \ source:\n                profile[field] = source[field]\n\n        # preferences\
          \ 必须保持为对象\n        if \"preferences\" in profile:\n            profile[\"\
          preferences\"] = parse_object(\n                profile[\"preferences\"\
          ],\n                \"preferences\"\n            )\n\n    # 6. 获取最新风险评估\n\
          \    latest_risk = parse_object(\n        source.get(\"latest_risk\"),\n\
          \        \"latest_risk\"\n    )\n\n    # 兼容接口字段名称为 latest_risk_assessment\n\
          \    if not latest_risk and source.get(\"latest_risk_assessment\") is not\
          \ None:\n        latest_risk = parse_object(\n            source.get(\"\
          latest_risk_assessment\"),\n            \"latest_risk_assessment\"\n   \
          \     )\n\n    # 7. 获取最新生活方案\n    latest_plan = parse_object(\n        source.get(\"\
          latest_plan\"),\n        \"latest_plan\"\n    )\n\n    # 兼容接口字段名称为 plan\n\
          \    if not latest_plan and source.get(\"plan\") is not None:\n        latest_plan\
          \ = parse_object(\n            source.get(\"plan\"),\n            \"plan\"\
          \n        )\n\n    # 8. 必须返回全部三个输出字段\n    return {\n        \"profile\"\
          : profile,\n        \"latest_risk\": latest_risk,\n        \"latest_plan\"\
          : latest_plan\n    }"
