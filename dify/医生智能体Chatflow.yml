          \ conv_doctor_id }) {\n  const safe = (v) => (v === null || v === undefined\
          \ ? '' : String(v).trim());\n\n  // user_id：优先 inputs → 其次 sys.user_id →\
          \ 最后会话变量\n  const uid = safe(input_user_id) || safe(sys_user_id) || safe(conv_user_id);\n\
          \n  // doctor_id：优先 inputs → 其次会话变量（续聊时 inputs 可能被忽略）\n  const did = safe(input_doctor_id)\
          \ || safe(conv_doctor_id);\n\n  // 校验：user_id 必须有（sys.user_id 兜底基本不会为空）\n\
          \  const user_ok = uid.length > 0;\n\n  // doctor_id 校验：续聊必须有会话变量兜底；新会话必须有\
          \ inputs\n  const doctor_ok = did.length > 0;\n\n  return {\n    effective_user_id:\
          \ uid,\n    effective_doctor_id: did,\n    user_ok,\n    doctor_ok,\n  \
          \  is_first_turn: safe(conv_user_id) === ''   // 会话变量为空 → 首轮\n  };\n}\n"
